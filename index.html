<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Premium 360 Virtual Tour Test</title>

  <!-- Pannellum CSS (CDN) -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"
  />

  <style>
    :root {
      --bg-1: #050b1a;
      --bg-2: #081936;
      --glass: rgba(12, 28, 56, 0.45);
      --glass-border: rgba(133, 214, 255, 0.25);
      --cyan: #50e6ff;
      --blue: #37a3ff;
      --text: #e8f3ff;
      --shadow-soft: 0 12px 40px rgba(0, 0, 0, 0.35);
      --shadow-glow: 0 0 24px rgba(80, 230, 255, 0.35);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Segoe UI", "SF Pro Text", "Helvetica Neue", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 85% 15%, rgba(55, 163, 255, 0.18), transparent 28%),
        radial-gradient(circle at 15% 85%, rgba(80, 230, 255, 0.16), transparent 30%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
    }

    /* Main app wrapper keeps the viewer as the central focus */
    .app {
      position: relative;
      width: 100vw;
      height: 100vh;
      isolation: isolate;
    }

    /* Fullscreen 360 viewer */
    #panorama {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      opacity: 1;
      transition: opacity 0.45s ease;
    }

    .viewer-fade {
      opacity: 0.82;
    }

    /* Soft futuristic overlay glow */
    .ambient-overlay {
      pointer-events: none;
      position: absolute;
      inset: 0;
      z-index: 2;
      background:
        radial-gradient(circle at 20% 15%, rgba(80, 230, 255, 0.10), transparent 24%),
        radial-gradient(circle at 82% 78%, rgba(55, 163, 255, 0.10), transparent 28%);
    }

    /* Top-center title panel */
    .tour-title {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      padding: 12px 18px;
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      background: var(--glass);
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow-soft), var(--shadow-glow);
      font-size: 0.95rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(232, 243, 255, 0.94);
      animation: floatIn 0.8s ease;
    }

    .tour-hint {
      position: absolute;
      right: 24px;
      bottom: 24px;
      z-index: 5;
      padding: 10px 12px;
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      background: var(--glass);
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow-soft);
      font-size: 0.8rem;
      color: rgba(232, 243, 255, 0.9);
    }

    /* External backup navigation buttons */
    .scene-buttons {
      position: absolute;
      top: 86px;
      right: 24px;
      z-index: 5;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 12px;
      border-radius: 14px;
      border: 1px solid var(--glass-border);
      background: var(--glass);
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow-soft);
    }

    .scene-btn {
      min-width: 128px;
      padding: 9px 12px;
      border: 1px solid rgba(255, 255, 255, 0.28);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.08);
      color: rgba(243, 250, 255, 0.95);
      font-size: 0.84rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .scene-btn:hover {
      transform: translateY(-1px);
      border-color: rgba(255, 255, 255, 0.6);
      box-shadow: 0 0 14px rgba(255, 255, 255, 0.25);
    }

    .scene-btn.active {
      border-color: rgba(255, 255, 255, 0.92);
      background: rgba(255, 255, 255, 0.2);
      box-shadow: 0 0 18px rgba(255, 255, 255, 0.38);
    }

    /* Custom Google Street View style hotspot rendered by createTooltipFunc */
    .custom-hotspot {
      width: 46px !important;
      height: 46px !important;
      margin-left: -23px !important;
      margin-top: -23px !important;
      display: grid;
      place-items: center;
      position: relative;
      cursor: pointer;
      pointer-events: auto;
      filter: drop-shadow(0 3px 8px rgba(0, 0, 0, 0.35));
      transition: transform 0.2s ease;
    }

    .custom-hotspot:hover,
    .custom-hotspot:focus-visible {
      transform: scale(1.08);
    }

    .custom-hotspot * {
      pointer-events: none;
      user-select: none;
    }

    .hotspot-dot {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.98);
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 5px 14px rgba(0, 0, 0, 0.28);
      z-index: 2;
      position: relative;
    }

    .hotspot-dot::before {
      content: "";
      position: absolute;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #0a0a0a;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1;
    }

    .hotspot-icon {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #ffffff;
      font-weight: 700;
      font-size: 14px;
      line-height: 1;
      z-index: 2;
      font-family: "Segoe UI", "Helvetica Neue", sans-serif;
    }

    .hotspot-pulse {
      position: absolute;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.45);
      background: rgba(255, 255, 255, 0.08);
      animation: pulseRing 1.7s ease-out infinite;
      z-index: 1;
    }

    .hotspot-label {
      position: absolute;
      bottom: 46px;
      left: 50%;
      transform: translateX(-50%) translateY(6px);
      padding: 6px 10px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.5);
      background: rgba(8, 24, 49, 0.9);
      color: var(--text);
      font-size: 0.74rem;
      letter-spacing: 0.02em;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      backdrop-filter: blur(8px);
      transition: opacity 0.2s ease, transform 0.2s ease;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.32);
    }

    .info-popup {
      position: absolute;
      top: 96px;
      left: 24px;
      z-index: 7;
      max-width: 320px;
      border-radius: 14px;
      border: 1px solid var(--glass-border);
      background: rgba(8, 22, 45, 0.82);
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow-soft);
      color: var(--text);
      padding: 12px 14px;
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .info-popup.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .info-popup-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }

    .info-popup-title {
      font-size: 0.9rem;
      font-weight: 700;
      color: #ffffff;
    }

    .info-popup-close {
      width: 26px;
      height: 26px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
      cursor: pointer;
      line-height: 1;
      font-size: 14px;
    }

    .info-popup-text {
      font-size: 0.84rem;
      color: rgba(232, 243, 255, 0.92);
      line-height: 1.5;
    }

    .custom-hotspot:hover .hotspot-label,
    .custom-hotspot:focus-visible .hotspot-label {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Bottom-left scene label */
    .scene-label {
      position: absolute;
      left: 24px;
      bottom: 24px;
      z-index: 5;
      padding: 12px 16px;
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      background: var(--glass);
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow-soft);
      font-size: 0.95rem;
      letter-spacing: 0.03em;
      animation: fadeInUp 0.7s ease;
    }

    .scene-name {
      color: var(--cyan);
      font-weight: 700;
      margin-left: 6px;
    }

    /* Center loading spinner while scene is changing */
    .loader {
      position: absolute;
      inset: 0;
      z-index: 6;
      display: grid;
      place-items: center;
      background: rgba(3, 9, 20, 0.28);
      backdrop-filter: blur(2px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .loader.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .spinner {
      width: 62px;
      height: 62px;
      border-radius: 50%;
      border: 3px solid rgba(80, 230, 255, 0.25);
      border-top-color: var(--cyan);
      border-right-color: var(--blue);
      box-shadow: 0 0 24px rgba(80, 230, 255, 0.35);
      animation: spin 0.9s linear infinite;
    }

    .loader-text {
      margin-top: 14px;
      text-align: center;
      font-size: 0.86rem;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: rgba(232, 243, 255, 0.88);
    }

    /* Mobile responsive tweaks */
    @media (max-width: 768px) {
      .tour-title {
        top: 12px;
        width: calc(100% - 24px);
        text-align: center;
        font-size: 0.78rem;
        letter-spacing: 0.09em;
        padding: 10px 12px;
      }

      .scene-label {
        left: 12px;
        top: 58px;
        bottom: auto;
        font-size: 0.86rem;
        padding: 10px 12px;
      }

      .scene-buttons {
        top: auto;
        right: 12px;
        left: 12px;
        bottom: 72px;
        flex-direction: row;
        gap: 8px;
        padding: 10px;
      }

      .scene-btn {
        min-width: 0;
        flex: 1;
        font-size: 0.8rem;
        padding: 9px 8px;
      }

      .tour-hint {
        right: 12px;
        left: 12px;
        bottom: 12px;
        text-align: center;
      }

      .info-popup {
        top: 96px;
        left: 12px;
        right: 12px;
        max-width: none;
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes floatIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {
      0%,
      100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.08);
      }
    }

    @keyframes pulseRing {
      0% {
        transform: scale(0.86);
        opacity: 0.92;
      }
      100% {
        transform: scale(1.22);
        opacity: 0.12;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div id="panorama"></div>
    <div class="ambient-overlay"></div>

    <!-- Top center title -->
    <div class="tour-title">Connected 360 Virtual Tour</div>

    <!-- Secondary backup navigation buttons -->
    <div class="scene-buttons" aria-label="Scene Buttons">
      <!-- Edit scene links by changing the data-scene values below -->
      <button class="scene-btn active" data-scene="panorama1">Panorama 1</button>
      <button class="scene-btn" data-scene="panorama2">Panorama 2</button>
      <button class="scene-btn" data-scene="panorama3">Panorama 3</button>
    </div>

    <!-- Bottom-left current scene label -->
    <div class="scene-label">
      Current Scene:
      <span class="scene-name" id="currentSceneName">Panorama 1</span>
    </div>

    <!-- Info popup for type: info hotspots -->
    <div class="info-popup" id="infoPopup" aria-live="polite">
      <div class="info-popup-head">
        <div class="info-popup-title" id="infoPopupTitle">More Info</div>
        <button class="info-popup-close" id="infoPopupClose" aria-label="Close Info">x</button>
      </div>
      <div class="info-popup-text" id="infoPopupText"></div>
    </div>

    <!-- Helper text to guide users toward hotspots -->
    <div class="tour-hint">Tap glowing markers to move between scenes</div>

    <!-- Loading spinner for scene changes -->
    <div class="loader" id="loader" aria-live="polite" aria-label="Loading scene">
      <div>
        <div class="spinner"></div>
        <div class="loader-text">Loading Panorama...</div>
      </div>
    </div>
  </div>

  <!-- Pannellum JS (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
  <script>
    // Build a custom glowing navigation marker for each scene hotspot.
    function createNavigationHotspot(hotspotDiv, args) {
      hotspotDiv.classList.add("custom-hotspot");
      hotspotDiv.setAttribute("tabindex", "0");
      hotspotDiv.setAttribute("aria-label", args.label);

      const pulse = document.createElement("span");
      pulse.className = "hotspot-pulse";

      const dot = document.createElement("span");
      dot.className = "hotspot-dot";

      const icon = document.createElement("span");
      icon.className = "hotspot-icon";
      icon.textContent = "i";

      const label = document.createElement("span");
      label.className = "hotspot-label";
      label.textContent = args.label;

      hotspotDiv.appendChild(pulse);
      hotspotDiv.appendChild(dot);
      hotspotDiv.appendChild(icon);
      hotspotDiv.appendChild(label);

      // For info hotspots, open popup content on click.
      if (args.hotspotType === "info") {
        hotspotDiv.addEventListener("click", (event) => {
          event.stopPropagation();
          showInfoPopup(args.label, args.infoText || "No extra information yet.");
        });
      }
    }

    // Scene configuration kept simple so beginners can edit quickly.
    // Edit guide inside each hotspot object:
    // 1) pitch: vertical hotspot position
    // 2) yaw: horizontal hotspot position
    // 3) type: "scene" or "info"
    // 4) sceneId: target scene key when type is "scene"
    // 5) infoText: popup text when type is "info"
    // Scene name and image path are edited with: title, path
    const SCENES = {
      panorama1: {
        // Edit scene name here
        title: "Panorama 1",
        // Edit image path here
        path: "assets/images/Panorama1.jpg",
        hotSpots: [
          // Navigation hotspot: Panorama 1 -> Panorama 2
          {
            type: "scene",
            text: "Go to Panorama 2",
            sceneId: "panorama2",
            pitch: -2,
            yaw: 38,
            createTooltipFunc: createNavigationHotspot,
            createTooltipArgs: {
              label: "Go to Panorama 2",
              hotspotType: "scene"
            }
          },
          // Info hotspot example in Panorama 1
          {
            type: "info",
            text: "More Info",
            pitch: 8,
            yaw: -12,
            createTooltipFunc: createNavigationHotspot,
            createTooltipArgs: {
              label: "More Info",
              hotspotType: "info",
              infoText: "This is an information point. Add your museum, room, or object details here."
            }
          }
        ]
      },
      panorama2: {
        // Edit scene name here
        title: "Panorama 2",
        // Edit image path here
        path: "assets/images/Panorama2.jpg",
        hotSpots: [
          // Navigation hotspot: Panorama 2 -> Panorama 1
          {
            type: "scene",
            text: "Back to Panorama 1",
            sceneId: "panorama1",
            pitch: -1,
            yaw: -42,
            createTooltipFunc: createNavigationHotspot,
            createTooltipArgs: {
              label: "Back to Panorama 1",
              hotspotType: "scene"
            }
          },
          // Navigation hotspot: Panorama 2 -> Panorama 3
          {
            type: "scene",
            text: "Go to Panorama 3",
            sceneId: "panorama3",
            pitch: 1,
            yaw: 40,
            createTooltipFunc: createNavigationHotspot,
            createTooltipArgs: {
              label: "Go to Panorama 3",
              hotspotType: "scene"
            }
          }
        ]
      },
      panorama3: {
        // Edit scene name here
        title: "Panorama 3",
        // Edit image path here
        path: "assets/images/Panorama3.jpg",
        hotSpots: [
          // Navigation hotspot: Panorama 3 -> Panorama 2
          {
            type: "scene",
            text: "Back to Panorama 2",
            sceneId: "panorama2",
            pitch: 0,
            yaw: -34,
            createTooltipFunc: createNavigationHotspot,
            createTooltipArgs: {
              label: "Back to Panorama 2",
              hotspotType: "scene"
            }
          },
          // Info hotspot example in Panorama 3
          {
            type: "info",
            text: "More Info",
            pitch: 10,
            yaw: 18,
            createTooltipFunc: createNavigationHotspot,
            createTooltipArgs: {
              label: "More Info",
              hotspotType: "info",
              infoText: "Add custom information here, such as history, artwork details, or room notes."
            }
          }
        ]
      }
    };

    const loaderEl = document.getElementById("loader");
    const sceneNameEl = document.getElementById("currentSceneName");
    const viewerEl = document.getElementById("panorama");
    const sceneButtons = document.querySelectorAll(".scene-btn");
    const infoPopupEl = document.getElementById("infoPopup");
    const infoPopupTitleEl = document.getElementById("infoPopupTitle");
    const infoPopupTextEl = document.getElementById("infoPopupText");
    const infoPopupCloseEl = document.getElementById("infoPopupClose");

    const showLoader = () => loaderEl.classList.add("visible");
    const hideLoader = () => loaderEl.classList.remove("visible");

    function updateActiveButton(sceneId) {
      sceneButtons.forEach((button) => {
        button.classList.toggle("active", button.dataset.scene === sceneId);
      });
    }

    function showInfoPopup(title, text) {
      infoPopupTitleEl.textContent = title;
      infoPopupTextEl.textContent = text;
      infoPopupEl.classList.add("visible");
    }

    function hideInfoPopup() {
      infoPopupEl.classList.remove("visible");
    }

    function goToScene(sceneId) {
      if (!SCENES[sceneId] || sceneId === viewer.getScene()) return;
      showLoader();
      viewerEl.classList.add("viewer-fade");
      viewer.loadScene(sceneId);
    }

    // Initialize Pannellum with 3 scenes and default scene as Panorama 1.
    const viewer = pannellum.viewer("panorama", {
      default: {
        firstScene: "panorama1",
        sceneFadeDuration: 900,
        autoLoad: true,
        showControls: true
      },
      scenes: {
        panorama1: {
          title: SCENES.panorama1.title,
          panorama: SCENES.panorama1.path,
          hotSpots: SCENES.panorama1.hotSpots,
          hfov: 110,
          pitch: 0,
          yaw: 0
        },
        panorama2: {
          title: SCENES.panorama2.title,
          panorama: SCENES.panorama2.path,
          hotSpots: SCENES.panorama2.hotSpots,
          hfov: 110,
          pitch: 0,
          yaw: 0
        },
        panorama3: {
          title: SCENES.panorama3.title,
          panorama: SCENES.panorama3.path,
          hotSpots: SCENES.panorama3.hotSpots,
          hfov: 110,
          pitch: 0,
          yaw: 0
        }
      }
    });

    // Hide the loader once a scene has finished loading.
    viewer.on("load", () => {
      hideLoader();
      viewerEl.classList.remove("viewer-fade");

      const activeScene = viewer.getScene();
      if (activeScene && SCENES[activeScene]) {
        sceneNameEl.textContent = SCENES[activeScene].title;
        updateActiveButton(activeScene);
      }
    });

    // Show loading state immediately when a scene switch begins (hotspot click).
    viewer.on("scenechange", (newSceneId) => {
      showLoader();
      viewerEl.classList.add("viewer-fade");

      if (SCENES[newSceneId]) {
        sceneNameEl.textContent = SCENES[newSceneId].title;
        updateActiveButton(newSceneId);
      }

      hideInfoPopup();
    });

    // Fallback if an image path is wrong or fails to load.
    viewer.on("error", () => {
      hideLoader();
      viewerEl.classList.remove("viewer-fade");
      alert("A panorama image failed to load. Please check your image paths.");
    });

    // Backup navigation: scene button click switches scenes.
    sceneButtons.forEach((button) => {
      button.addEventListener("click", () => {
        goToScene(button.dataset.scene);
      });
    });

    infoPopupCloseEl.addEventListener("click", hideInfoPopup);

    // Show loader briefly at startup until Panorama 1 is ready.
    showLoader();
  </script>
</body>
</html>
